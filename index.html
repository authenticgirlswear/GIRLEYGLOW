    PERFORMANCE — RESOURCE HINTS
    ─────────────────────────────
    CRITICAL RULE: Lighthouse penalises more than 2–3 preconnects on mobile.

  <!--
    FONTS — Non-render-blocking pattern
    Uses media="print" trick: browser downloads the CSS in background,
    then JS switches it to media="all" once loaded. Zero FCP impact.
    font-display=swap in the font URL means text shows in fallback
    font immediately — no invisible text (FOIT).
  -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@400;500;600&display=swap"
