    Performance: open TCP+TLS+DNS to image / analytics origins BEFORE
    React boots so the first image bytes can start flying in parallel
    with the JS download. This dramatically improves LCP on mobile.
  -->

  <link rel="dns-prefetch" href="https://res.cloudinary.com" />

    content="Shop our premium collection of push-up bras, maternity wear, shapewear, nightwear, and elegant dresses for every occasion." />

    "name": "Girley Glow",
    "url": "https://authentic-girlswear.vercel.app/",
    "logo": "https://res.cloudinary.com/dss2bt2fu/image/upload/girlswear/logo.png",

  </script>

  <!-- Structured Data: WebSite with SearchAction -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Girley Glow",
    "url": "https://authentic-girlswear.vercel.app/",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://authentic-girlswear.vercel.app/search?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <!--
    Analytics scripts loaded with defer so they NEVER block the LCP
    paint. They still execute before DOMContentLoaded, which is fine
    for Pixel / GTM bootstrap.
  -->

    !function (f, b, e, v, n, t, s) {

      n.push = n;
      n.loaded = true;
      n.version = '2.0';
      n.queue = [];

      t = b.createElement(e);
      t.async = true;
      t.src = v;

      s = b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t, s);
    }(
      window,
      document,
      'script',
      'https://connect.facebook.net/en_US/fbevents.js'
    );

    fbq('init', '517991158551582');
    // PageView is intentionally NOT fired here.
    // It is handled by PixelTracker in App.tsx on every route change.
  </script>
  <script defer>
    (function (w, d, s, l, i) {
